<!-- 

    BODY

 -->
<div class="todo">
    <div class="header">
        <h1>ToDo List</h1>
        <input type="text" class="todo-input" placeholder="Wpisz treść zadania...">
        <button class="btn-add">Add</button>
    </div>
    <div class="todolist">
        <h3>Lista zadań:</h3>
        <p class="error-info"></p>
        <ul>
            <li data-id='test1'>Wypić kawę
                <div class="tools">
                    <button class="complete"><i class="ri-check-line"></i></button><button class="edit">EDIT</button><button class="delete"><i class="ri-close-fill"></i></button>
                </div>
            </li>
            <li data-id='test2'>Zjeść śniadanie
                <div class="tools">
                    <button class="complete"><i class="ri-check-line"></i></button><button class="edit">EDIT</button><button class="delete"><i class="ri-close-fill"></i></button>
                </div>
            </li>
            <li data-id='test3'>Umyć okna
                <div class="tools">
                    <button class="complete"><i class="ri-check-line"></i></button><button class="edit">EDIT</button><button class="delete"><i class="ri-close-fill"></i></i></button>
                </div>
            </li>
        </ul>
    </div>
</div>

<div class="popup">
    <h3>Edytuj zadanie:</h3>
    <div class="popup-body">
        <p class="popup-info"></p>
        <input type="text" class="popup-input" placeholder="Wprowadź nową treść zadania...">
        <button class="popup-btn accept">Zatwierdź</button>
        <button class="popup-btn cancel">Anuluj</button>
    </div>
</div>

<script src="script.js"></script>
